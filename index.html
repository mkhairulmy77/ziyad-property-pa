<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SURIA — Ziyad Property AI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:sans-serif;background:#f0f0f0;min-height:100vh;}
.header{background:#1a1a1a;padding:20px 16px 16px;}
.header-top{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.avatar{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid #a3e635;}
.header-title p{margin:0;font-size:11px;color:#a3e635;letter-spacing:0.8px;}
.header-title h1{margin:2px 0 0;font-size:22px;font-weight:500;color:white;letter-spacing:1px;}
.header-sub{font-size:11px;color:#888;margin-top:2px;}
.feature-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:6px;}
.feature-grid2{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.feat{background:#2a2a2a;border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;border:1.5px solid transparent;transition:all 0.2s;}
.feat.active{border:1.5px solid #a3e635;background:#333;}
.feat span{display:block;font-size:18px;margin-bottom:3px;}
.feat p{font-size:10px;color:#a3e635;font-weight:500;margin:0;}
.content{padding:16px;}
.card{background:white;border-radius:14px;border:0.5px solid #e0e0e0;overflow:hidden;margin-bottom:12px;}
.card-header{background:#f8f8f8;padding:12px 16px;border-bottom:0.5px solid #e8e8e8;display:flex;align-items:center;gap:8px;}
.card-header span{font-size:16px;}
.card-header p{margin:0;font-size:13px;font-weight:500;color:#1a1a1a;}
.card-body{padding:14px;display:flex;flex-direction:column;gap:10px;}
label{font-size:10px;color:#888;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.6px;}
.input-wrap{position:relative;display:flex;align-items:center;gap:6px;}
.input-wrap input,.input-wrap textarea{flex:1;}
